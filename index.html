<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020411">
    <title>Olmaliq City</title>
    <style>*{padding:0;margin:0;box-sizing:border-box}body,html{overflow-x:hidden}body{background:#020411}.hero{padding:16px 0 36px}.hero__container{max-width:490px;margin:0 auto;padding:0 10px}.wrapper{background:url(./images/bg.avif) no-repeat center/cover}.hero__top{display:flex;align-items:center;justify-content:center;gap:30px;margin-bottom:16px;max-width:450px;width:100%}.hero__top-min{border-left:1px solid #fff;padding-left:5px;display:flex;align-items:center;gap:6px}.hero__top-min p{font:400 18px/130% Inter,sans-serif;color:#FF4B2B}.hero__top-min span{font:400 16px/130% Inter,sans-serif;color:#fff}.hero__title{font:900 clamp(28px, 8.9vw, 42px)/120% Kuunari,sans-serif;text-align:center;text-transform:uppercase;margin-bottom:8px;color:#fff}.hero__title span{color:#FF4B2B}.hero__text{font:500 clamp(11px, 3.4vw, 16px)/120% Sora,sans-serif;text-align:center;margin-bottom:10px;color:#fff}.hero__main{max-width:490px;margin:0 auto;position:relative}.hero__main p{font:400 clamp(25px, 8.5vw, 32px)/100% Italianno,sans-serif;position:absolute;letter-spacing:2%;top:clamp(10px, 2.5vw, 22px);margin:0 0 -30px clamp(153px, 40.5vw, 272px);white-space:nowrap;color:#fff;transform:rotate(8.47deg)}.hero__main img{max-width:490px;width:100%;height:auto;margin-bottom:-90px;-webkit-mask-image:linear-gradient(to right,transparent 0%,#000 8%,#000 92%,transparent 100%),linear-gradient(to bottom,#000 65%,transparent 100%);-webkit-mask-composite:source-in;mask-image:linear-gradient(to right,transparent 0%,#000 8%,#000 92%,transparent 100%),linear-gradient(to bottom,#000 65%,transparent 100%);mask-composite:intersect}.hero__btn{max-width:441px;width:100%;background:linear-gradient(135deg,#FF4B2B 0%,#FF416C 100%);padding:42px 0;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;text-decoration:none;font:700 clamp(23px, 7vw, 34px)/100% Kuunari,sans-serif;letter-spacing:5%;margin:-75px auto 0;border-radius:26px;border:0;cursor:pointer;position:relative;z-index:2;text-align:center;text-transform:uppercase;animation:btnWave 1.8s infinite}@media(max-width:340px){.hero__btn{padding:38px 0}}@keyframes btnWave{0%{box-shadow:0 0 0 0 #FF4B2B}70%{box-shadow:0 0 0 18px #fff0}100%{box-shadow:0 0 0 0 #fff0}}</style>
    <link rel="stylesheet" href="./css/main.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="./css/main.css"></noscript>
</head>

<body>
    <main>
        <section class="hero">
            <div class="hero__container">
                <div class="wrapper">
                    <div class="hero__top">
                        <div class="hero__top-min">
                            <p>20:00</p>
                            <span>Vaqti</span>
                        </div>
                        <div class="hero__top-min">
                            <p>30-Aprel</p>
                            <span>Kuni</span>
                        </div>
                    </div>
                    <h1 class="hero__title">60 million bosh to'lov, Qolgan summani <span>60 oy foizsiz</span> bo'lib to'lang!</h1>
                    <p class="hero__text">Bu aksiya bor yo'g'i 100 ta xonadon uchun amal qiladi.</p>
                </div>
            </div>
            <div class="hero__main">
                <img src="./images/mainImg.avif" loading="eager" fetchpriority="high" decoding="async" width="490" height="555" alt="mainImg">
            </div>
            <div style="padding:0 10px">
                <button class="hero__btn webinar-cta">
                    Bepul qatnashish
                    <img src="./images/telegram.avif" loading="lazy" decoding="async" width="29" height="29" alt="telegram">
                </button>
            </div>
            <p style="color: white; text-align: center; padding-top: 15px; font-family: sans-serif;">Batafsil onlayn taqdimotda bilib oling!</p>
        </section>
    </main>

    <div id="registrationModal" class="homeModal" style="display:none">
        <div class="homeModalOverlay"></div>
        <div class="homeFormContainer">
            <button class="closeButton" id="closeModalBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 12 12" fill="none">
                    <path d="M1 11L11 1M1 1.00001L11 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="homeFormTop">
                <h1 class="homeFormTopTitle">Davom etish uchun telefon <br> raqamingizni qoldiring</h1>
            </div>
            <form id="registrationForm" name="contact-form">
                <div class="HomeFormRow">
                    <label class="HomeFormRowLabel" for="phone">Telefon raqamingiz:</label>
                    <div class="phone-input-container">
                        <button type="button" class="selected-country" id="selectedCountry">
                            <span class="selected-flag" id="selectedCountryFlag">🇺🇿</span>
                            <svg id="dropdownIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                            <span class="selected-code" id="selectedCountryCodeText">+998</span>
                        </button>
                        <div class="country-dropdown" id="countryDropdown" style="display:none"></div>
                        <div class="phone-field">
                            <input class="HomeFormRowInput phone-input" type="tel" id="phone" name="phone" inputmode="numeric" placeholder="88 888 88 88" autocomplete="tel" style="border:0;background:transparent;padding-left:5px">
                        </div>
                    </div>
                    <p class="homeFormErrorText" id="phoneError" style="display:none">❌ Telefon raqam mos emas!</p>
                </div>
                <button type="submit" class="HomeFormBtn" id="submitBtn">DAVOM ETISH</button>
            </form>
        </div>
    </div>

    <script src="./js/phoneFormatter.js" defer></script>
    <script src="./js/app.js" defer></script>

</body>

</html>
